name: Security Audit

on:
  pull_request:
    paths:
      - package.json
      - yarn.lock
      - .github/workflows/security-audit.yml
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - package.json
      - yarn.lock
      - .github/workflows/security-audit.yml
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Yarn audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI image
        run: docker build --file Dockerfile.ci --tag microbo-team-ci .

      - name: Audit production dependencies
        continue-on-error: true
        run: docker run --rm microbo-team-ci yarn audit --groups dependencies
